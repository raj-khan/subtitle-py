# auto-transcript config. Edit and restart to apply.

# --- Appearance ---
font_size: 32           # px
font_color: "#FFFF00"   # caption text color (hex)
font_family: "Sans"

background: true        # semi-transparent box behind text (readability)
background_color: "#000000"
background_opacity: 0.55   # 0.0 = invisible, 1.0 = solid

max_lines: 2            # rolling caption lines kept on screen
linger_sec: 3.0         # keep last caption this long after speech stops, then fade

width: 900             # overlay width in px
# Drag the caption to move it; the position is remembered automatically.

# --- Engine ---
model: "tiny.en"        # tiny.en | base.en | small.en
                        # KEEP-UP NOTE: each transcribe costs a near-fixed amount
                        # (tiny ~0.5s, base ~1s, small ~4.5s), paid every refresh_sec.
                        # For LIVE captions that don't fall behind, that cost must be
                        # less than refresh_sec. tiny.en keeps up easily and is barely
                        # worse than base.en on hard audio. base.en is a touch cleaner
                        # but needs refresh_sec >= 1.5. small.en is too slow for live;
                        # use it only for offline/clear speech.
                        # For translation use a multilingual model: tiny | base | small
refresh_sec: 1.0        # how often we re-transcribe and commit words. THE lag knob:
                        # it must be larger than the model's per-call cost above or
                        # captions drift behind forever. 1.0 suits tiny.en; raise to
                        # 1.5-2.0 if you switch to base.en.
cpu_threads: 4          # max CPU cores Whisper may use. The knob for "this slows my
                        # PC down": left unset Whisper grabs ALL cores. 4 keeps the
                        # desktop responsive. Try 2 if it still bites.
max_window_sec: 10.0    # how much audio each refresh re-transcribes. Compute is
                        # nearly flat with this (Whisper pads internally), so a bigger
                        # window buys CONTEXT/accuracy almost for free. It is NOT the
                        # lag knob (refresh_sec is). Keep under ~25.
max_lag_sec: 2.5        # safety net: if transcription falls more than this far
                        # behind real time, drop the stale audio and skip to the
                        # present. Stops captions from snowballing minutes behind at
                        # the cost of a few missed words. Lower = stricter/more current.

# --- Language / translation ---
# task: "transcribe" = caption the speech as spoken (English-only with a .en model).
#       "translate"  = detect the spoken language and output ENGLISH subtitles.
# To translate (e.g. Bahasa Malay), set task: translate AND a multilingual model
# above (e.g. base or small). A .en model can't translate and is swapped with a note.
task: "transcribe"
# language: source-language hint. "en", "ms" (Malay), "es", "fr", ... or "auto"
# to let Whisper detect it. For Malay: language: ms (faster, steadier) or auto.
language: "en"
